name: Code Quality

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: code-quality-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  formatting:
    name: Formatting
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install clang-format
        run: sudo apt-get update && sudo apt-get install -y clang-format

      - name: Check C and C++ formatting
        shell: bash
        run: |
          files=$(git diff \
            --name-only \
            --diff-filter=ACMR \
            "${{ github.event.pull_request.base.sha }}" \
            "${{ github.event.pull_request.head.sha }}" \
            -- '*.c' '*.h' '*.cpp' '*.hpp')

          if [ -z "$files" ]; then
            echo "No C or C++ files changed."
            exit 0
          fi

          echo "Checking:"
          echo "$files"

          failed=0

          while IFS= read -r file; do
            if ! clang-format --dry-run --Werror "$file"; then
              failed=1
            fi
          done <<< "$files"

          if [ "$failed" -ne 0 ]; then
            echo
            echo "Formatting errors found."
            echo "Run clang-format -i on the reported files."
            exit 1
          fi

  whitespace:
    name: Whitespace
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check whitespace
        run: |
          git diff \
            --check \
            "${{ github.event.pull_request.base.sha }}" \
            "${{ github.event.pull_request.head.sha }}"

  commit-messages:
    name: Commit Messages
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate commit messages
        shell: bash
        run: |
          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"

          failed=0

          while IFS= read -r subject; do
            echo "Checking: $subject"

            # Allow automatic GitHub revert commits.
            if [[ "$subject" == Revert\ \"* ]]; then
              continue
            fi

            # Maximum subject length.
            if [ "${#subject}" -gt 72 ]; then
              echo "::error::Commit subject exceeds 72 characters: $subject"
              failed=1
            fi

            # Require: lowercase area: lowercase description
            # Examples:
            # drivers: add bme280 support
            # bluetooth: handle send failure
            # ci: add formatting checks
            if ! [[ "$subject" =~ ^[a-z0-9][a-z0-9_-]*(/[a-z0-9_-]+)?:\ [a-z0-9] ]]; then
              echo "::error::Invalid commit format: $subject"
              echo "Expected: area: lowercase imperative description"
              failed=1
            fi

            # Do not end the subject with punctuation.
            if [[ "$subject" =~ [.\!\?]$ ]]; then
              echo "::error::Commit subject must not end with punctuation: $subject"
              failed=1
            fi
          done < <(git log --format='%s' "$base..$head")

          exit "$failed"