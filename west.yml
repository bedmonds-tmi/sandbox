manifest:
  version: 1.2

  self:
    path: dev

  remotes:
    - name: zephyr_sdk
      url-base: https://github.com/zephyrproject-rtos

  projects:
    - name: zephyr
      remote: zephyr_sdk
      repo-path: zephyr
      revision: v4.4.0
      import:
        file: west.yml
        path-prefix: deps
        name-allowlist:
          - zephyr
          - cmsis_6
          - hal_nordic
